version: "3.9"

services:
  db:
    image: postgres:15
    container_name: db
    restart: always
    env_file:
      - .env
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    container_name: migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    env_file:
      - .env
    command: [
      "-path=/migrations",
      "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable",
      "up"
    ]

  backend:
    build:
      context: ./backend
    container_name: backend
    depends_on:
      - db
      - migrate
    env_file:
      - .env
      - ./backend/.env
    ports:
      - "8080:8080"
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    depends_on:
      - backend
    env_file:
      - .env
      - ./frontend/.env
    ports:
      - "5173:5173"
    restart: always

volumes:
  pgdata: